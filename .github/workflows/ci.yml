name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Analyzer (no warnings allowed)
        run: flutter analyze --fatal-infos

      - name: Unit tests
        run: flutter test
