<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Audit your German Nebenkostenabrechnung against national benchmarks and legal rules, then draft a formal objection letter.">
  <meta name="theme-color" content="#EEEDE3">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NebenCheck">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>NebenCheck — Audit your Nebenkosten</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body { background: #EEEDE3; margin: 0; height: 100%; }
    #nc-splash {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      color: #2F6A4F; font: 700 14px/1.4 "Courier New", Courier, monospace;
      letter-spacing: 0.08em;
    }
    #nc-splash .ring {
      width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid rgba(47,106,79,0.18);
      border-top-color: #2F6A4F;
      animation: nc-spin 0.9s linear infinite;
    }
    @keyframes nc-spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      #nc-splash .ring { animation: none; }
    }
  </style>
</head>
<body>
  <div id="nc-splash"><div class="ring"></div>NebenCheck</div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('nc-splash');
      if (s) s.remove();
    });
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
